[defaults]
asset = "BTC"
start_date = "2025-09-01"
end_date = "2026-03-05"
registry_mode = "current"
deployment_mode = "refresh"
sizing_mode = "runtime"

[defaults.overrides]
admission.max_active_alphas = 1000
deployment.max_alphas = 120
deployment.max_replacements = 1
deployment.promotion_margin = 0.05
paper.rebalance_deadband_usd = 5.0

[[experiment]]
name = "champion-current"
notes = "Current BTC testnet profile used as the comparison baseline."

[[experiment]]
name = "challenger-deployment-90"

[experiment.overrides]
deployment.max_alphas = 90

[[experiment]]
name = "challenger-deployment-150"

[experiment.overrides]
deployment.max_alphas = 150

[[experiment]]
name = "challenger-deadband-0"

[experiment.overrides]
paper.rebalance_deadband_usd = 0.0

[[experiment]]
name = "challenger-deadband-10"

[experiment.overrides]
paper.rebalance_deadband_usd = 10.0
